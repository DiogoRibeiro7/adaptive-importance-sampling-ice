[mypy]
python_version = 3.11

# Tell mypy what to check by default (so `mypy --config-file mypy.ini` works)
files = safe_ice, tests

# Ignore common build dirs on Linux/macOS/Windows
# (^|[\\/])  — dir boundary
# (build|dist|\.venv|\.mypy_cache) — directories to skip
# ([\\/]|$) — next slash or end of string
exclude = (^|[\\/])(build|dist|\.venv|\.mypy_cache)([\\/]|$)

# Typical strict-ish settings (tune as you like)
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
no_implicit_optional = True
disallow_untyped_defs = True
disallow_incomplete_defs = True

# If you have 3rd-party libs without stubs, keep this on initially
ignore_missing_imports = True


