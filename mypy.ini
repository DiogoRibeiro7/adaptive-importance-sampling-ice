# mypy.ini
[mypy]
python_version = 3.11
# directories / globs mypy should check by default:
files = safe_ice, tests

# (optional) ignore generated or vendored code
exclude = (?x)(
    ^.*/build/|
    ^.*/dist/|
    ^.*/\.venv/|
    ^.*/_version\.py
)

# Typical strict-ish baseline
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
no_implicit_optional = True
disallow_untyped_defs = True
disallow_incomplete_defs = True

