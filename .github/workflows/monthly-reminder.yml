name: Monthly maintenance reminder

on:
  schedule:
    # Second Monday of each month at 09:00 UTC
    - cron: "0 9 8-14 * 1"
  workflow_dispatch:

jobs:
  monthly-reminder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read

    env:
      REPO: ${{ github.repository }}
      REPO_NAME: ${{ github.event.repository.name }}
      OWNER: ${{ github.repository_owner }}
      # Optional: set org/repo variable MAINTAINER to override who gets assigned.
      MAINTAINER: ${{ vars.MAINTAINER != '' && vars.MAINTAINER || github.repository_owner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure jq is available
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi

      # 1️⃣ Compute time window (last 30 days)
      - name: Compute time window
        id: time_window
        run: |
          SINCE=$(date -u -d "30 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "Comparison window starts: $SINCE"

      # 2️⃣ Fetch repository statistics (no hardcoded names)
      - name: Gather repository stats
        id: repo_stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${REPO}"
          SINCE="${{ steps.time_window.outputs.since }}"

          # Basic repo info (stars, visibility, language)
          REPO_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO")
          STARS=$(echo "$REPO_INFO" | jq -r '.stargazers_count')
          VISIBILITY=$(echo "$REPO_INFO" | jq -r '.visibility')
          LANGUAGE=$(echo "$REPO_INFO" | jq -r '.language')

          # Last commit timestamp (default branch)
          LAST_COMMIT=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/commits?per_page=1" \
            | jq -r '.[0].commit.committer.date')

          # Commits in the last 30 days (paginate up to 300 for safety)
          COMMIT_COUNT=0
          PAGE=1
          while :; do
            COMMITS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/commits?since=$SINCE&per_page=100&page=$PAGE")
            COUNT=$(echo "$COMMITS" | jq 'length')
            COMMIT_COUNT=$((COMMIT_COUNT + COUNT))
            [ "$COUNT" -lt 100 ] && break
            PAGE=$((PAGE + 1))
            [ "$PAGE" -gt 3 ] && break
          done

          # PR stats via Search API (reliable total_count)
          OPEN_PRS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/search/issues?q=repo:$REPO+type:pr+is:open" | jq -r '.total_count')
          NEW_PRS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/search/issues?q=repo:$REPO+type:pr+is:open+created:>$SINCE" | jq -r '.total_count')
          MERGED_PRS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/search/issues?q=repo:$REPO+type:pr+is:closed+merged:>$SINCE" | jq -r '.total_count')

          # Issue stats via Search API
          OPEN_ISSUES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/search/issues?q=repo:$REPO+is:issue+is:open" | jq -r '.total_count')
          NEW_ISSUES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/search/issues?q=repo:$REPO+is:issue+created:>$SINCE" | jq -r '.total_count')
          CLOSED_ISSUES=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/search/issues?q=repo:$REPO+is:issue+closed:>$SINCE" | jq -r '.total_count')

          # Latest workflow run (any workflow), conclusion + time
          RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/runs?status=completed&per_page=1")
          WF_STATUS=$(echo "$RUNS" | jq -r '.workflow_runs[0].conclusion // "unknown"')
          WF_TIME=$(echo "$RUNS" | jq -r '.workflow_runs[0].updated_at // "N/A"')

          {
            echo "last_commit=$LAST_COMMIT"
            echo "commit_count=$COMMIT_COUNT"
            echo "open_prs=$OPEN_PRS"
            echo "new_prs=$NEW_PRS"
            echo "merged_prs=$MERGED_PRS"
            echo "open_issues=$OPEN_ISSUES"
            echo "new_issues=$NEW_ISSUES"
            echo "closed_issues=$CLOSED_ISSUES"
            echo "workflow_status=$WF_STATUS"
            echo "workflow_time=$WF_TIME"
            echo "stars=$STARS"
            echo "visibility=$VISIBILITY"
            echo "language=$LANGUAGE"
          } >> "$GITHUB_OUTPUT"

      # 3️⃣ Find or create the tracking issue
      - name: Find existing reminder issue
        id: find_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="📅 Monthly maintenance reminder"
          ISSUE_NUMBER=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${REPO}/issues?state=open&per_page=100" |
            jq -r --arg t "$TITLE" '.[] | select(.title == $t) | .number' | head -n1)
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create issue if none exists
        if: steps.find_issue.outputs.issue_number == ''
        id: create_issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "📅 Monthly maintenance reminder"
          # Optional: create this file with custom checklist; otherwise we post a generic comment below.
          content-filepath: .github/reminder-message.md
          labels: maintenance, reminder
          assignees: ${{ env.MAINTAINER }}

      - name: Assign issue to maintainer (if already existed)
        if: steps.find_issue.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ISSUE_NUMBER="${{ steps.find_issue.outputs.issue_number }}"
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"assignees':['"\"${MAINTAINER}\""']}' \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/assignees" >/dev/null

      # 4️⃣ Post comment with dynamic repo name and Python-friendly checklist
      - name: Add monthly summary comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ISSUE_NUMBER="${{ steps.find_issue.outputs.issue_number != '' && steps.find_issue.outputs.issue_number || steps.create_issue.outputs.issue-number }}"

          COMMENT=$(cat <<'EOF'
          👋 Monthly maintenance summary for **${REPO_NAME}**

          ## 📊 Repository Snapshot
          - 🕒 **Last commit:** ${{ steps.repo_stats.outputs.last_commit }}
          - ⭐ **Stars:** ${{ steps.repo_stats.outputs.stars }}
          - 🔒 **Visibility:** ${{ steps.repo_stats.outputs.visibility }}
          - 🧠 **Primary language (GitHub-detected):** ${{ steps.repo_stats.outputs.language }}

          ## 🔁 Changes (last 30 days)
          - 🧮 **Commits:** ${{ steps.repo_stats.outputs.commit_count }}
          - 🧩 **PRs:** +${{ steps.repo_stats.outputs.new_prs }} opened, +${{ steps.repo_stats.outputs.merged_prs }} merged (open now: ${{ steps.repo_stats.outputs.open_prs }})
          - 🐞 **Issues:** +${{ steps.repo_stats.outputs.new_issues }} opened, +${{ steps.repo_stats.outputs.closed_issues }} closed (open now: ${{ steps.repo_stats.outputs.open_issues }})

          ## ✅ CI Status
          - **Latest workflow conclusion:** ${{ steps.repo_stats.outputs.workflow_status }}
          - **Last run:** ${{ steps.repo_stats.outputs.workflow_time }}

          ## 🧠 Suggested Actions (Python repos)
          - [ ] Review open PRs and triage issues
          - [ ] Update docs & examples; run `pytest -q` locally
          - [ ] Check packaging: `python -m build && twine check dist/*` (if applicable)
          - [ ] Verify toolchain versions (Python, Poetry/uv/pip)
          - [ ] Refresh badges (CI, coverage)
          - [ ] Consider a release if changes warrant it

          _Triggered automatically on $(date -u '+%Y-%m-%d %H:%M UTC')._
          EOF
          )

          # Expand env vars in template (REPO_NAME). GitHub expressions remain untouched.
          COMMENT_EXPANDED=$(eval "echo \"$COMMENT\"")
          COMMENT_ESCAPED=$(printf "%s" "$COMMENT_EXPANDED" | jq -Rs .)

          curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $COMMENT_ESCAPED}" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" >/dev/null
