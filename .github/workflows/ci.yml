name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # If your dev extra already includes all tools, this is enough:
          pip install -e ".[dev]"
          # Otherwise, uncomment to be explicit and robust:
          # pip install pytest pytest-cov ruff black isort mypy bandit pip-audit

      - name: Run ruff
        run: ruff check .

      - name: Run black
        run: black --check .

      - name: Run isort
        run: isort --check-only .

      - name: Run mypy
        run: mypy safe_ice/

      - name: Run tests with coverage
        run: pytest --cov=safe_ice --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov (OIDC)
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          use_oidc: true
        permissions:
          id-token: write    # required for OIDC

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # If dev extra doesn't include them, add:
          # pip install bandit pip-audit

      - name: Run bandit
        run: bandit -r safe_ice/ -f json -o bandit-report.json

      - name: Run pip-audit
        run: pip-audit --desc
