name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    # OIDC perms needed for Codecov v5 tokenless upload
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff
          # OptimizedSafeICE imports numba optionally; include it for parity.
          pip install numba

      - name: Run ruff (critical checks only)
        run: ruff check safe_ice tests --select E9,F63,F7,F82

      - name: Run tests with coverage
        run: pytest --cov=safe_ice --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov (OIDC)
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          use_oidc: true
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # Ensure tools exist even if [dev] is missing them:
          pip install --upgrade bandit pip-audit

      - name: Run bandit
        run: bandit -r safe_ice/ -f json -o bandit-report.json

      - name: Run pip-audit
        run: pip-audit --desc
